name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan minden vasárnap 03:00 UTC
    - cron: "0 3 * * 0"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
            working-directory: ditto-java-client
          - language: javascript-typescript
            build-mode: none
            working-directory: ditto-nodejs-client
          - language: python
            build-mode: none
            working-directory: ditto-python-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21 (Java only)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          source-root: ${{ matrix.working-directory }}

      - name: Build (Java only)
        if: matrix.language == 'java-kotlin'
        working-directory: ${{ matrix.working-directory }}
        run: ./gradlew assemble

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
