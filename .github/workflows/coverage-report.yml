name: Client Coverage Report

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  nodejs:
    name: Node.js Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ditto-nodejs-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run Node tests with coverage
        run: |
          set -o pipefail
          node --test --experimental-test-coverage tests/*.test.mjs | tee coverage-node.txt
      - name: Upload Node coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage-nodejs
          path: ditto-nodejs-client/coverage-node.txt

  go:
    name: Go Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ditto-go-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run Go coverage
        run: |
          go test ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage-go.txt
      - name: Upload Go coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage-go
          path: |
            ditto-go-client/coverage.out
            ditto-go-client/coverage-go.txt

  python:
    name: Python Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ditto-python-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + coverage tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . coverage
      - name: Run Python coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage xml -o coverage.xml
          coverage report | tee coverage-python.txt
      - name: Upload Python coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage-python
          path: |
            ditto-python-client/.coverage
            ditto-python-client/coverage.xml
            ditto-python-client/coverage-python.txt

  java:
    name: Java Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ditto-java-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run Java tests + JaCoCo report
        run: ./gradlew --no-daemon test jacocoTestReport
      - name: Upload Java coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage-java
          path: |
            ditto-java-client/build/reports/jacoco/test/jacocoTestReport.xml
            ditto-java-client/build/reports/jacoco/test/html/**
