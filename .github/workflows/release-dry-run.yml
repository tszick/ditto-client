name: Client Release Dry Run

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Target release version (for example: 0.2.0)"
        required: true
        default: "0.2.0"

jobs:
  release-plan:
    name: Release Plan + Changelog Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release dry-run plan
        run: bash scripts/release-dry-run.sh "${{ inputs.release_version }}"
      - name: Upload changelog preview
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-changelog
          path: release-dry-run-changelog.md

  nodejs:
    name: Node.js package dry run
    runs-on: ubuntu-latest
    needs: release-plan
    defaults:
      run:
        working-directory: ditto-nodejs-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: NPM pack dry run
        run: npm pack --dry-run

  python:
    name: Python package dry run
    runs-on: ubuntu-latest
    needs: release-plan
    defaults:
      run:
        working-directory: ditto-python-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build sdist/wheel
        run: python -m build
      - name: Upload Python dist
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: ditto-python-client/dist/*

  java:
    name: Java jar dry run
    runs-on: ubuntu-latest
    needs: release-plan
    defaults:
      run:
        working-directory: ditto-java-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build jar
        run: ./gradlew --no-daemon clean jar
      - name: Upload Java jar
        uses: actions/upload-artifact@v4
        with:
          name: java-jar
          path: ditto-java-client/build/libs/*.jar

  go:
    name: Go release sanity
    runs-on: ubuntu-latest
    needs: release-plan
    defaults:
      run:
        working-directory: ditto-go-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test
        run: go test ./...
